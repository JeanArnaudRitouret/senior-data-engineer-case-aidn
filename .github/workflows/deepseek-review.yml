name: DeepSeek PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: deepseek-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip fork PRs (secrets unavailable) and PRs opted out via title
    if: >-
      github.event.pull_request.head.repo.fork != true &&
      !contains(github.event.pull_request.title, '[skip-review]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff
        run: git diff --unified=3 "origin/${{ github.base_ref }}...HEAD" > /tmp/pr.diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: pip install pydantic httpx

      - name: Run DeepSeek review
        run: python .github/scripts/deepseek_review.py < /tmp/pr.diff
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
